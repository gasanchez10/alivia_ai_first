<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#5A3360" />
    <script>
      try {
        var t = localStorage.getItem('alivia.theme');
        if (
          t === 'dark' ||
          (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch (e) {}
    </script>
    <meta name="description" content="Alivia AI — Guías, congresos y evidencia listos cada mañana. Para residentes y estudiantes de medicina en LATAM." />
    <title>Alivia AI — IA para residentes y estudiantes de medicina</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
